general {
    # col.active_border = rgba(978e9877)
    # col.inactive_border = rgba(4b444d55)

    # Option 1: Solid Primary (Standard Material You Accent)
    col.active_border = rgba(e1b8f5ff)

    # Option 2: Vibrant Gradient (Primary to Tertiary)
