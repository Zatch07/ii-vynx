$lock_cmd = ~/.config/qylock/smart_lock.sh
# $lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = res=$(hyprctl dispatch 'hl.dsp.global("quickshell:lockFocus")' 2>&1); [[ "$res" =~ "error:" ]] && hyprctl dispatch global quickshell:lockFocus
    inhibit_sleep = 3
}

listener {
    timeout = 300 # 5mins
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600 # 10mins
    on-timeout = res=$(hyprctl dispatch 'hl.dsp.dpms("off")' 2>&1); [[ "$res" =~ "error:" ]] && hyprctl dispatch dpms off
    on-resume = res=$(hyprctl dispatch 'hl.dsp.dpms("on")' 2>&1); [[ "$res" =~ "error:" ]] && hyprctl dispatch dpms on
}

listener {
    timeout = 900 # 15mins
    on-timeout = $suspend_cmd
}
