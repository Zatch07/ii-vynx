# hyprlang noerror false
# See https://wiki.hyprland.org/Configuring/Binds/
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # [hidden] Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # [hidden] Edit extra keybinds

#!
##! Workspace and Window Movement
# Unbind default keycodes to avoid conflicts
unbind = Super+Alt, code:10
unbind = Super+Alt, code:11
unbind = Super+Alt, code:12
unbind = Super+Alt, code:13
unbind = Super+Alt, code:14
unbind = Super+Alt, code:15
unbind = Super+Alt, code:16
unbind = Super+Alt, code:17
unbind = Super+Alt, code:18
unbind = Super+Alt, code:19
unbind = Super+Alt, code:87
unbind = Super+Alt, code:88
unbind = Super+Alt, code:89
unbind = Super+Alt, code:83
unbind = Super+Alt, code:84
unbind = Super+Alt, code:85
unbind = Super+Alt, code:79
unbind = Super+Alt, code:80
unbind = Super+Alt, code:81
unbind = Super+Alt, code:90

unbind = Super+Shift, code:10
unbind = Super+Shift, code:11
unbind = Super+Shift, code:12
unbind = Super+Shift, code:13
unbind = Super+Shift, code:14
unbind = Super+Shift, code:15
unbind = Super+Shift, code:16
unbind = Super+Shift, code:17
unbind = Super+Shift, code:18
unbind = Super+Shift, code:19
unbind = Super+Shift, code:87
unbind = Super+Shift, code:88
unbind = Super+Shift, code:89
unbind = Super+Shift, code:83
unbind = Super+Shift, code:84
unbind = Super+Shift, code:85
unbind = Super+Shift, code:79
unbind = Super+Shift, code:80
unbind = Super+Shift, code:81
unbind = Super+Shift, code:90

# Move focused app to desired workspace
bind = Super+Shift, 1, movetoworkspace, 1 # Move active window to workspace
bind = Super+Shift, 2, movetoworkspace, 2 # [hidden]
bind = Super+Shift, 3, movetoworkspace, 3 # [hidden]
bind = Super+Shift, 4, movetoworkspace, 4 # [hidden]
bind = Super+Shift, 5, movetoworkspace, 5 # [hidden]
bind = Super+Shift, 6, movetoworkspace, 6 # [hidden]
bind = Super+Shift, 7, movetoworkspace, 7 # [hidden]
bind = Super+Shift, 8, movetoworkspace, 8 # [hidden]
bind = Super+Shift, 9, movetoworkspace, 9 # [hidden]
bind = Super+Shift, 0, movetoworkspace, 10 # [hidden]

# Move whole workspace to other workspace silently
bind = Ctrl+Super, 1, exec, ~/.local/bin/workspace-shift 1 # Move workspace silently
bind = Ctrl+Super, 2, exec, ~/.local/bin/workspace-shift 2 # [hidden]
bind = Ctrl+Super, 3, exec, ~/.local/bin/workspace-shift 3 # [hidden]
bind = Ctrl+Super, 4, exec, ~/.local/bin/workspace-shift 4 # [hidden]
bind = Ctrl+Super, 5, exec, ~/.local/bin/workspace-shift 5 # [hidden]
bind = Ctrl+Super, 6, exec, ~/.local/bin/workspace-shift 6 # [hidden]
bind = Ctrl+Super, 7, exec, ~/.local/bin/workspace-shift 7 # [hidden]
bind = Ctrl+Super, 8, exec, ~/.local/bin/workspace-shift 8 # [hidden]
bind = Ctrl+Super, 9, exec, ~/.local/bin/workspace-shift 9 # [hidden]
bind = Ctrl+Super, 0, exec, ~/.local/bin/workspace-shift 10 # [hidden]

# Move whole workspace to other workspace and follow
bind = Super+Alt, 1, exec, ~/.local/bin/workspace-shift 1 && hyprctl dispatch workspace 1 # Move workspace & follow
bind = Super+Alt, 2, exec, ~/.local/bin/workspace-shift 2 && hyprctl dispatch workspace 2 # [hidden]
bind = Super+Alt, 3, exec, ~/.local/bin/workspace-shift 3 && hyprctl dispatch workspace 3 # [hidden]
bind = Super+Alt, 4, exec, ~/.local/bin/workspace-shift 4 && hyprctl dispatch workspace 4 # [hidden]
bind = Super+Alt, 5, exec, ~/.local/bin/workspace-shift 5 && hyprctl dispatch workspace 5 # [hidden]
bind = Super+Alt, 6, exec, ~/.local/bin/workspace-shift 6 && hyprctl dispatch workspace 6 # [hidden]
bind = Super+Alt, 7, exec, ~/.local/bin/workspace-shift 7 && hyprctl dispatch workspace 7 # [hidden]
bind = Super+Alt, 8, exec, ~/.local/bin/workspace-shift 8 && hyprctl dispatch workspace 8 # [hidden]
bind = Super+Alt, 9, exec, ~/.local/bin/workspace-shift 9 && hyprctl dispatch workspace 9 # [hidden]
bind = Super+Alt, 0, exec, ~/.local/bin/workspace-shift 10 && hyprctl dispatch workspace 10 # [hidden]

# Window Swapping
bind = Super+Alt, Left, swapwindow, l # [hidden]
bind = Super+Alt, Right, swapwindow, r # Swap window
bind = Super+Alt, Up, swapwindow, u # Swap window (Arrows)
bind = Super+Alt, Down, swapwindow, d # [hidden]

# Window Resizing
# Unbind default Super+Shift movement to allow resizing
unbind = Super+Shift, Left
unbind = Super+Shift, Right
unbind = Super+Shift, Up
unbind = Super+Shift, Down
binde = Super+Shift, Right, resizeactive, 50 0 # Resize window
binde = Super+Shift, Left, resizeactive, -50 0 # [hidden]
binde = Super+Shift, Up, resizeactive, 0 -50 # Resize window (Arrows)
binde = Super+Shift, Down, resizeactive, 0 50 # [hidden]


##! Custom Apps
# Unbind default Super, B (left sidebar toggle) to use it for Vivaldi
unbind = Super, B
bind = Super, B, exec, thorium-browser-avx2 # Browser

##! Shell (Custom)
# Unbind default Super tap for app launcher
unbind = Super, Super_L
unbind = Super, Super_R

# Alt + Grave (Launcher / Search)
bindd = Alt, grave, Toggle search, global, quickshell:searchToggleRelease
bind = Alt, grave, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || fuzzel # [hidden] Launcher

# Restart all widgets
unbind = Ctrl+Super, R
bind = Ctrl+Super, R, exec, ~/.config/hypr/custom/scripts/refresh-quickshell.sh # Refresh Hyprland and Quickshell

# Unbind default Super, J (Toggle bar) and rebind to Ctrl+Super, B
unbind = Super, J
bindd = Ctrl+Super, B, Toggle bar, global, quickshell:barToggle # Toggle bar

# Toggle hoverboard
bind = Super, U, exec, ~/.config/caelestia-hoverboard/toggle-hoverboard.sh # Toggle hoverboard


##! Wallpaper and Tab Switcher
# Skwd Window Switcher
bind = Alt, Tab, exec, bash -c 'echo "switcherNext" > ${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/skwd/cmd' # Window switcher next
bind = Alt+Shift, Tab, exec, bash -c 'echo "switcherPrev" > ${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/skwd/cmd' # Window switcher prev

# Wallpaper Switcher
# Unbind the new Vynx-II default 'Ctrl+Super, T' and rebind it to the old 'Ctrl+Super, W'
unbind = Ctrl+Super, T
unbind = Ctrl+Super+Alt, T

bindd = Ctrl+Super, W, Toggle wallpaper selector, global, quickshell:customWallpaperSelectorToggle # Wallpaper selector
bindd = Ctrl+Super+Alt, W, Select random wallpaper, global, quickshell:customWallpaperSelectorRandom # Random wallpaper

##! Media (Custom)
bindd = Ctrl+Super, M, Toggle media mode, global, quickshell:mediaModeToggle # Music overlay

