# Don't print a new line at the start of the prompt
add_newline = false
# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

format = """
$cmd_duration 󰜥 $directory $git_branch
$character"""

# Replace the "❯" symbol in the prompt with "➜"
[character]                            
success_symbol = "[   ](bold fg:#{{colors.primary.default.hex_stripped}})"
error_symbol = "[   ](bold fg:#{{colors.error.default.hex_stripped}})"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:#{{colors.tertiary.default.hex_stripped}}"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = "󰜥 [](bold fg:#{{colors.tertiary.default.hex_stripped}})[$symbol $branch(:$remote_branch)](fg:#{{colors.background.default.hex_stripped}} bg:#{{colors.tertiary.default.hex_stripped}})[ ](bold fg:#{{colors.tertiary.default.hex_stripped}})"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[•$hostname](bg:#{{colors.tertiary.default.hex_stripped}} bold fg:#{{colors.background.default.hex_stripped}})[](bold fg:#{{colors.tertiary.default.hex_stripped}})"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#{{colors.tertiary.default.hex_stripped}} fg:#{{colors.background.default.hex_stripped}}"
style_root = "red bold"
format = "[](bold fg:#{{colors.tertiary.default.hex_stripped}})[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "  "
read_only = "  "
style = "bg:#{{colors.primary.default.hex_stripped}} fg:#{{colors.background.default.hex_stripped}}"
truncation_length = 6
truncation_symbol = " ••/"
format = '[](bold fg:#{{colors.primary.default.hex_stripped}})[󰉋 $path]($style)[](bold fg:#{{colors.primary.default.hex_stripped}})'

[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[](bold fg:#{{colors.secondary.default.hex_stripped}})[󰪢 $duration](bold bg:#{{colors.secondary.default.hex_stripped}} fg:#{{colors.background.default.hex_stripped}})[](bold fg:#{{colors.secondary.default.hex_stripped}})'
