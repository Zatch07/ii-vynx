[config]
version_check = false

[templates.m3colors]
input_path = '~/.config/matugen-custom/templates/colors.json'
output_path = '~/.local/state/quickshell/user/generated/colors.json'

[templates.hyprland]
input_path = '~/.config/matugen-custom/templates/hyprland/colors.lua'
output_path = '~/.config/hypr/hyprland/colors.lua'

[templates.hyprlock]
input_path = '~/.config/matugen-custom/templates/hyprland/hyprlock-colors.conf'
output_path = '~/.config/hypr/hyprlock/colors.conf'

[templates.fuzzel]
input_path = '~/.config/matugen-custom/templates/fuzzel/fuzzel_theme.ini'
output_path = '~/.config/fuzzel/fuzzel_theme.ini'

[templates.gtk3]
input_path = '~/.config/matugen-custom/templates/gtk-3.0/gtk.css'
output_path = '~/.config/gtk-3.0/gtk.css'

[templates.gtk4]
input_path = '~/.config/matugen-custom/templates/gtk-4.0/gtk.css'
output_path = '~/.config/gtk-4.0/gtk.css'

[templates.gtk4_dark]
input_path = '~/.config/matugen-custom/templates/gtk-4.0/gtk-dark.css'
output_path = '~/.config/gtk-4.0/gtk-dark.css'

[templates.kde_colors]
input_path = '~/.config/matugen-custom/templates/kde/color.txt'
output_path = '~/.local/state/quickshell/user/generated/color.txt'

[templates.wallpaper]
input_path = '~/.config/matugen-custom/templates/wallpaper.txt'
output_path = '~/.local/state/quickshell/user/generated/wallpaper/path.txt'

[templates.discord]
input_path = '~/.config/matugen-custom/templates/midnight-discord.css'
output_path = '~/.config/Vencord/themes/midnight.theme.css'

[templates.spicetify]
input_path = '~/.config/matugen-custom/templates/spotify-colors.ini'
output_path = '~/.config/spicetify/Themes/wal/color.ini'
post_hook = "~/.config/hypr/custom/scripts/post-matugen.sh"

[templates.btop]
input_path = '~/.config/matugen-custom/templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'

[templates.doom]
input_path = '~/.config/matugen-custom/templates/doom-matugen-theme.el'
output_path = '~/.config/doom/themes/doom-matugen-theme.el'
post_hook = "timeout 2 emacsclient -e \"(load-theme 'doom-matugen t)\" 2>/dev/null || true"

[templates.kitty]
input_path = '~/.config/matugen-custom/templates/kitty-colors.conf'
output_path = '~/.config/kitty/matugen-colors.conf'
post_hook = "killall -USR1 kitty"

[templates.antigravity]
input_path = '~/.config/matugen-custom/templates/antigravity-agent.json.tpl'
output_path = '~/.gemini/antigravity-ide/customThemeSeedsDark.json'
post_hook = "~/.config/matugen-custom/scripts/update_antigravity.sh"

[templates.vscode]
input_path = '~/.config/matugen-custom/templates/vscode/dankshell.json'
output_path = '~/.vscode/extensions/matugen-theme/themes/matugen-color-theme.json'

[templates.vscode_settings]
input_path = '~/.config/matugen-custom/templates/vscode/vscode-premium.json.tpl'
output_path = '~/.config/Code/User/settings.json'

[templates.antigravity_ide]
input_path = '~/.config/matugen-custom/templates/vscode/dankshell.json'
output_path = '~/.antigravity-ide/extensions/matugen-theme/themes/matugen-color-theme.json'

[templates.antigravity_ide_settings]
input_path = '~/.config/matugen-custom/templates/vscode/vscode-premium.json.tpl'
output_path = '~/.config/Antigravity IDE/User/settings.json'


[templates.nvim]
input_path = '~/.config/matugen-custom/templates/nvim-tokyonight.lua'
output_path = '~/.config/nvim/lua/plugins/matugen.lua'

[templates.nighttab_colors]
input_path = '~/.config/matugen-custom/templates/nighttab.json'
output_path = '~/.config/matugen-custom/templates/thorium-nighttab/colors.json'

